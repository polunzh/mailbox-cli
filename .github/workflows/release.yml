name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64
          - goos: openbsd
            goarch: amd64
            suffix: openbsd-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist/package
          BINARY_NAME="mailbox"
          ARCHIVE_NAME="mailbox_${VERSION#v}_${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "dist/package/${BINARY_NAME}" .
          cp README.md dist/package/
          cp README.zh-CN.md dist/package/
          tar -czf "dist/${ARCHIVE_NAME}.tar.gz" -C dist/package .
          sha256sum "dist/${ARCHIVE_NAME}.tar.gz" > "dist/${ARCHIVE_NAME}.tar.gz.sha256"
          rm -rf dist/package
          ls -la dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums manifest
        working-directory: dist
        run: |
          sha256sum *.tar.gz > SHA256SUMS.txt
          ls -la

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
          fi

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: polunzh/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p homebrew-tap/Formula
          DARWIN_AMD64_SHA="$(cut -d' ' -f1 "dist/mailbox_${TAG#v}_darwin-amd64.tar.gz.sha256")"
          DARWIN_ARM64_SHA="$(cut -d' ' -f1 "dist/mailbox_${TAG#v}_darwin-arm64.tar.gz.sha256")"
          go run ./cmd/release-homebrew-formula \
            --repo "$REPO" \
            --version "$TAG" \
            --darwin-amd64-sha "$DARWIN_AMD64_SHA" \
            --darwin-arm64-sha "$DARWIN_ARM64_SHA" \
            > homebrew-tap/Formula/mailbox.rb

      - name: Ensure tap README files
        run: |
          if [ ! -f homebrew-tap/README.md ]; then
            printf '%s\n' \
              '[中文](./README.zh-CN.md) | **English**' \
              '' \
              '# homebrew-tap' \
              '' \
              'Homebrew tap for `mailbox`.' \
              '' \
              '```bash' \
              'brew tap polunzh/tap' \
              'brew install mailbox' \
              '```' \
              > homebrew-tap/README.md
          fi
          if [ ! -f homebrew-tap/README.zh-CN.md ]; then
            printf '%s\n' \
              '**中文** | [English](./README.md)' \
              '' \
              '# homebrew-tap' \
              '' \
              '`mailbox` 的 Homebrew tap。' \
              '' \
              '```bash' \
              'brew tap polunzh/tap' \
              'brew install mailbox' \
              '```' \
              > homebrew-tap/README.zh-CN.md
          fi

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/mailbox.rb README.md README.zh-CN.md; then
            echo "No Homebrew tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mailbox.rb README.md README.zh-CN.md
          git commit -m "mailbox ${GITHUB_REF_NAME}"
          git push origin HEAD
